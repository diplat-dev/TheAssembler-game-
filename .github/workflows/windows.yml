name: Windows CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build game and tests
        shell: pwsh
        run: .\build.ps1 all

      - name: Run deterministic tests
        shell: pwsh
        run: .\build\roguelike_tests.exe
